services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nutrivision
      POSTGRES_PASSWORD: nutrivision
      POSTGRES_DB: nutrivision
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutrivision"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NUTRIVISION_ENV: production
      NUTRIVISION_JWT_SECRET: ${NUTRIVISION_JWT_SECRET:?JWT secret required}
      NUTRIVISION_DB_URL: postgresql://nutrivision:nutrivision@postgres:5432/nutrivision
      NUTRIVISION_CORS_ORIGINS: ${NUTRIVISION_CORS_ORIGINS:-http://localhost:80,http://localhost:5173}
      NUTRIVISION_SENTRY_DSN: ${NUTRIVISION_SENTRY_DSN:-}
      NUTRIVISION_YOLO_CONFIDENCE: "0.60"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - model_cache:/app/models

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.0
    profiles: ["monitoring"]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    restart: unless-stopped
    user: "1001:1001"
    security_opt:
      - no-new-privileges:true

  grafana:
    image: grafana/grafana:11.2.0
    profiles: ["monitoring"]
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    user: "1001:1001"
    security_opt:
      - no-new-privileges:true
    depends_on:
      - prometheus

volumes:
  pgdata:
  model_cache:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
